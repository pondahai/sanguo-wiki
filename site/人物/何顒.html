<p><b>總出現次數</b>:2,<b>出場回數</b>:2 回</p>
<h2>生平</h2>
<h3>生平概述</h3>
<p><a href="../%E4%BA%BA%E7%89%A9/%E4%BD%95%E9%A1%92.html">何顒</a>為東漢末年士人，與<a href="../%E4%BA%BA%E7%89%A9/%E6%9B%B9%E6%93%8D.html">曹操</a>交好。他具備政治洞察力，曾評價<a href="../%E4%BA%BA%E7%89%A9/%E6%9B%B9%E6%93%8D.html">曹操</a>為能安定天下之人，並預見漢室將亡。</p>
<p>在<a href="../%E4%BA%BA%E7%89%A9/%E4%BD%95%E9%80%B2.html">何進</a>迎立太子劉辯即位之際，<a href="../%E4%BA%BA%E7%89%A9/%E4%BD%95%E9%A1%92.html">何顒</a>作為隨從進入宮中參與相關事務。</p>
<h3>重要事蹟</h3>
<ul>
<li>第1回：<a href="../%E4%BA%BA%E7%89%A9/%E4%BD%95%E9%A1%92.html">何顒</a>見<a href="../%E4%BA%BA%E7%89%A9/%E6%9B%B9%E6%93%8D.html">曹操</a>，認為漢室將亡，能安天下的人必定是<a href="../%E4%BA%BA%E7%89%A9/%E6%9B%B9%E6%93%8D.html">曹操</a>。</li>
<li>第2回：<a href="../%E4%BA%BA%E7%89%A9/%E4%BD%95%E9%80%B2.html">何進</a>入宮扶立太子辯即位時，<a href="../%E4%BA%BA%E7%89%A9/%E4%BD%95%E9%A1%92.html">何顒</a>隨同<a href="../%E4%BA%BA%E7%89%A9/%E4%BD%95%E9%80%B2.html">何進</a>進入宮中。</li>
</ul>
<h3>人物關係</h3>
<ul>
<li><b>盟友</b>：<a href="../%E4%BA%BA%E7%89%A9/%E6%9B%B9%E6%93%8D.html">曹操</a>（被其視為可安天下之人）</li>
<li><b>主公/上司</b>：<a href="../%E4%BA%BA%E7%89%A9/%E4%BD%95%E9%80%B2.html">何進</a>（隨同其入宮）</li>
</ul>
