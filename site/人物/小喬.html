<p><b>總出現次數</b>:4,<b>出場回數</b>:2 回</p>
<h2>生平</h2>
<h3>生平概述</h3>
<p><a href="../%E4%BA%BA%E7%89%A9/%E5%B0%8F%E5%96%AC.html">小喬</a>為<a href="../%E4%BA%BA%E7%89%A9/%E5%91%A8%E7%91%9C.html">周瑜</a>之妻，其身份在《三國演義》中主要透過婚姻關係得以確立。</p>
<p>在<a href="../%E4%BA%BA%E7%89%A9/%E8%AB%B8%E8%91%9B%E4%BA%AE.html">諸葛亮</a>憑弔<a href="../%E4%BA%BA%E7%89%A9/%E5%91%A8%E7%91%9C.html">周瑜</a>時，其祭文中曾提及<a href="../%E4%BA%BA%E7%89%A9/%E5%B0%8F%E5%96%AC.html">小喬</a>為<a href="../%E4%BA%BA%E7%89%A9/%E5%91%A8%E7%91%9C.html">周瑜</a>之佳配，顯示其在<a href="../%E4%BA%BA%E7%89%A9/%E5%91%A8%E7%91%9C.html">周瑜</a>生命終點時的存在與地位。</p>
<h3>重要事蹟</h3>
<ul>
<li>為<a href="../%E4%BA%BA%E7%89%A9/%E5%91%A8%E7%91%9C.html">周瑜</a>之妻子（第44回）</li>
<li>在<a href="../%E4%BA%BA%E7%89%A9/%E8%AB%B8%E8%91%9B%E4%BA%AE.html">諸葛亮</a>祭文中被提及為<a href="../%E4%BA%BA%E7%89%A9/%E5%91%A8%E7%91%9C.html">周瑜</a>之佳配（第57回）</li>
</ul>
