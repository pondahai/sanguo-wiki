<p><b>總出現次數</b>:5,<b>出場回數</b>:1 回</p>
<h2>生平</h2>
<h3>生平概述</h3>
<p><a href="../%E4%BA%BA%E7%89%A9/%E7%A8%8B%E9%81%A0%E5%BF%97.html">程遠志</a>為黃巾軍將領，統領五萬軍隊進攻<a class="missing" title="尚無此條目">涿郡</a>。在戰鬥初期，他派遣副將<a href="../%E4%BA%BA%E7%89%A9/%E9%84%A7%E8%8C%82.html">鄧茂</a>出陣挑戰。隨後，<a href="../%E4%BA%BA%E7%89%A9/%E7%A8%8B%E9%81%A0%E5%BF%97.html">程遠志</a>親自率軍與敵方交鋒，並試圖攻擊對方猛將<a href="../%E4%BA%BA%E7%89%A9/%E5%BC%B5%E9%A3%9B.html">張飛</a>。最終，<a href="../%E4%BA%BA%E7%89%A9/%E7%A8%8B%E9%81%A0%E5%BF%97.html">程遠志</a>在戰場上被<a href="../%E4%BA%BA%E7%89%A9/%E9%97%9C%E7%BE%BD.html">關羽</a>斬殺。</p>
<h3>重要事蹟</h3>
<ul>
<li>統兵五萬來犯<a class="missing" title="尚無此條目">涿郡</a>（第1回）</li>
<li>遣副將<a href="../%E4%BA%BA%E7%89%A9/%E9%84%A7%E8%8C%82.html">鄧茂</a>出戰，<a href="../%E4%BA%BA%E7%89%A9/%E9%84%A7%E8%8C%82.html">鄧茂</a>被<a href="../%E4%BA%BA%E7%89%A9/%E5%BC%B5%E9%A3%9B.html">張飛</a>刺死（第1回）</li>
<li>拍馬舞刀直取<a href="../%E4%BA%BA%E7%89%A9/%E5%BC%B5%E9%A3%9B.html">張飛</a>，被<a href="../%E4%BA%BA%E7%89%A9/%E9%97%9C%E7%BE%BD.html">關羽</a>揮為兩段（第1回）</li>
</ul>

</ul>
