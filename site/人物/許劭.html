<p><b>總出現次數</b>:1,<b>出場回數</b>:1 回</p>
<h2>生平</h2>
<h3>生平概述</h3>
<p><a href="../%E4%BA%BA%E7%89%A9/%E8%A8%B1%E5%8A%AD.html">許劭</a>在當時享有極高的聲譽，以具備洞察人才與品評人物的能力而聞名於世。</p>
<p><a href="../%E4%BA%BA%E7%89%A9/%E6%9B%B9%E6%93%8D.html">曹操</a>曾主動向<a href="../%E4%BA%BA%E7%89%A9/%E8%A8%B1%E5%8A%AD.html">許劭</a>詢問其自身定位，試圖獲取這位知名評論家的評價。</p>
<p><a href="../%E4%BA%BA%E7%89%A9/%E8%A8%B1%E5%8A%AD.html">許劭</a>對<a href="../%E4%BA%BA%E7%89%A9/%E6%9B%B9%E6%93%8D.html">曹操</a>作出了「治世之能臣，亂世之奸雄」的著名定論，此言論成為後世認知<a href="../%E4%BA%BA%E7%89%A9/%E6%9B%B9%E6%93%8D.html">曹操</a>性格的重要依據。</p>
<h3>重要事蹟</h3>
<ul>
<li>接受<a href="../%E4%BA%BA%E7%89%A9/%E6%9B%B9%E6%93%8D.html">曹操</a>的諮詢，並給予「治世之能臣，亂世之奸雄」的评价。（第1回）</li>
</ul>

</ul>
