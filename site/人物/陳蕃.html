<p><b>總出現次數</b>:2,<b>出場回數</b>:1 回</p>
<h2>生平</h2>
<h3>生平概述</h3>
<p><a href="../%E4%BA%BA%E7%89%A9/%E9%99%B3%E8%95%83.html">陳蕃</a>在<a class="missing" title="尚無此條目">漢靈帝</a>時期擔任太傅一職，並與大將軍<a href="../%E4%BA%BA%E7%89%A9/%E7%AB%87%E6%AD%A6.html">竇武</a>共同輔佐朝政。</p>
<p>當時朝廷中宦官勢力龐大，<a href="../%E4%BA%BA%E7%89%A9/%E9%99%B3%E8%95%83.html">陳蕃</a>企圖謀誅以<a href="../%E4%BA%BA%E7%89%A9/%E6%9B%B9%E7%AF%80.html">曹節</a>為首的弄權宦官集團。</p>
<p>然而由於機密洩漏，<a href="../%E4%BA%BA%E7%89%A9/%E9%99%B3%E8%95%83.html">陳蕃</a>的反擊行動失敗，最終遭到宦官殺害。</p>
<h3>重要事蹟</h3>
<ul>
<li>擔任太傅，與大將軍<a href="../%E4%BA%BA%E7%89%A9/%E7%AB%87%E6%AD%A6.html">竇武</a>共輔佐<a class="missing" title="尚無此條目">漢靈帝</a>（第1回）</li>
<li>謀誅弄權的宦官<a href="../%E4%BA%BA%E7%89%A9/%E6%9B%B9%E7%AF%80.html">曹節</a>等人，因機事不密，反為所害（第1回）</li>
</ul>
